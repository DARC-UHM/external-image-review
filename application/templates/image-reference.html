<html lang="en">

<body>
<nav id="filterSidebar" class="collapsed d-flex flex-column flex-shrink-0 position-fixed" style="top: 0;">
    <div class="hide-on-collapse px-3 mt-4">
        <div class="d-flex mb-4">
            <div class="my-auto fw-semibold">
                Filters
            </div>
            <button
                    class="ms-auto mt-2 me-2 sidebar-close-btn"
                    style="background: none; border: none;"
                    onclick="toggleSidebar()"
                    data-toggle="tooltip"
                    data-bs-placement="right"
                    data-bs-html="true"
                    title="Hide filters"
            >
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3"><path d="m313-440 224 224-57 56-320-320 320-320 57 56-224 224h487v80H313Z"/></svg>
            </button>
        </div>
        <label for="idTypeFilterSelect" class="small text-muted">
            Filter by ID type
        </label>
        <div class="position-relative mx-auto">
            <select
                    id="idTypeFilterSelect"
                    class="px-3 small w-100"
                    style="background-color: var(--darc-input-bg); cursor: pointer;"
            >
                <option value="any" selected>Any ID type</option>
                <option value="morphospecies">Only morphospecies</option>
                <option value="tentativeId">Only tentative ID</option>
                <option value="morphoOrTentative">Only morphospecies or tentative ID</option>
            </select>
            <div class="position-absolute pe-none" style="top: 4px; right: 1rem;">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3" class="my-auto">
                    <path d="M480-360 280-560h400L480-360Z"/>
                </svg>
            </div>
        </div>
        <hr class="sidebar-section-divider">
        <label for="baitInteractionFilterSelect" class="small text-muted">
            Filter by bait interaction
        </label>
        <div class="position-relative mx-auto">
            <select
                    id="baitInteractionFilterSelect"
                    class="px-3 small w-100"
                    style="background-color: var(--darc-input-bg); cursor: pointer;"
            >
                <option value="any" selected>Any bait interaction</option>
                <option value="attracted">Attracted</option>
                <option value="notAttracted">Not attracted</option>
            </select>
            <div class="position-absolute pe-none" style="top: 4px; right: 1rem;">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3" class="my-auto">
                    <path d="M480-360 280-560h400L480-360Z"/>
                </svg>
            </div>
        </div>
        <hr class="sidebar-section-divider">
        <div>
            <label for="phylogenyTree" class="small text-muted">
                Filter by phylogeny
            </label>
            <ul id="phylogenyTree" class="list-unstyled small" style="max-height: 500px; overflow-y: auto;">

                        <span class="phylo-label phylo-label-active" data-filter="any" onclick="updatePhylogenyFilter('any');">Any</span>
                    </div>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="content collapsed">
    <div class="mt-4 mx-5 d-flex justify-content-between">

                        class="rounded-1 small"

            <div

                    <option value="phylum">Phylum</option>
                    <option value="class">Class</option>
                    <option value="order">Order</option>
                    <option value="family">Family</option>
                    <option value="genus">Genus</option>
                    <option value="species">Species</option>
                    <option value="depth">Depth</option>

                <div class="position-absolute pe-none" style="top: 0; right: 1rem;">
                    <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#e3e3e3">
                        <path d="M480-360 280-560h400L480-360Z"/>
                    </svg>
                </div>
            </div>
        </div>
        <div class="my-auto text-end" style="min-width: 2.5rem;">
            <span id="resultsCount" class="small text-muted"></span>
        </div>
    </div>
    <div id="imageGrid" class="row d-flex my-3 mx-5">
    </div>
