<!doctype html>
<html lang="en">
<head>
    <title>DARC Observations Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        html, body, #map {
            height: 100%;
            margin: 0;
        }

        #keywordFilterInput:focus {
            outline: none;
        }
        .tooltip-inner {
            white-space: nowrap;
            max-width: none;
        }
        .leaflet-popup-content {
            margin: 12px;
            min-width: 220px;
        }

        .popup-image {
            position: relative;
            width: 100%;
            height: 140px;
            overflow: hidden;
            border-radius: 8px;
            background: #f3f3f3;
        }

        .popup-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;

            opacity: 0;
            transition: opacity 0.2s ease;
        }

        .popup-image img.loaded {
            opacity: 1;
        }

        .popup-spinner {
            position: absolute;
            top: 50%;
            left: 50%;

            width: 28px;
            height: 28px;

            margin-left: -14px;
            margin-top: -14px;

            border: 3px solid #ddd;
            border-top-color: #1e88e5;
            border-radius: 50%;

            animation: popup-spin 0.8s linear infinite;
        }

        @keyframes popup-spin {
            to {
                transform: rotate(360deg);
            }
        }

        .popup-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .popup-table {
            width: 100%;
            border-collapse: collapse;
        }

        .popup-table td {
            padding: 4px 0;
            vertical-align: top;
        }

        .popup-table td:first-child {
            font-weight: 600;
            color: #666;
            padding-right: 10px;
        }

        .popup-link {
            margin-top: 12px;
        }

        .popup-link a {
            color: #1976d2;
            text-decoration: none;
        }

        .popup-link a:hover {
            text-decoration: underline;
        }

        .legend {
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 12px;
            border-radius: 6px;
            box-shadow: 0 1px 5px rgba(0,0,0,0.4);
            font: 14px/1.4 sans-serif;
        }

        .legend-count {
            text-align: center;
            font-size: 12px;
            margin-bottom: 6px;
        }

        .legend h4 {
            margin: 0 0 8px;
            font-size: 14px;
            font-weight: 600;
        }

        .legend div {
            display: flex;
            align-items: center;
            margin: 3px 0;
        }

        .legend-color {
            width: 16px;
            height: 16px;
            border: 1px solid #333;
            margin-right: 8px;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/esri-leaflet@3.0.14/dist/esri-leaflet.js"></script>
<script>
    const annotations = {{ annotations|safe }};
</script>
<script type="module" src="{{ url_for('static', filename='js/observations.js') }}"></script>
</body>
</html>
